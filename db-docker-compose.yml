version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: fieldpro-db
    restart: always
    environment:
      POSTGRES_DB: fieldpro
      POSTGRES_USER: fieldpro_user
      POSTGRES_PASSWORD: fieldpro_password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
